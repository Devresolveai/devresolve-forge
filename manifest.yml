modules:
  jira:issueCreated:
    - key: devresolve-issue-created
      function: devresolve-remote-handler

  jira:issueTransitioned:
    - key: devresolve-issue-transitioned
      function: devresolve-remote-handler

  jira:adminPage:
    - key: devresolve-config
      function: devresolve-config-page
      title: DevResolve Configuration

  function:
    - key: devresolve-remote-handler
      handler: index.handler
      remote: devresolve-api

    - key: devresolve-config-page
      handler: config.handler

remotes:
  - key: devresolve-api
    baseUrl: https://api.devresolve.ai
    auth:
      appSystemToken: true

app:
  name: DevResolve

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - read:jira-user
  external:
    fetch:
      backend:
        - https://api.devresolve.ai
