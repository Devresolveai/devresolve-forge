modules:
  jira:issueCreated:
    - key: devresolve-issue-created
      function: devresolve-remote-handler

  jira:issueTransitioned:
    - key: devresolve-issue-transitioned
      function: devresolve-remote-handler

  function:
    - key: devresolve-remote-handler
      handler: index.handler
      remote: devresolve-api

remotes:
  - key: devresolve-api
    baseUrl: https://api.devresolve.ai
    auth:
      appSystemToken: true

app:
  id: ari:cloud:ecosystem::app/a59d630a-06ca-48ec-85e0-0f26bb09e4d1
  runtime:
    name: nodejs20.x

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - read:jira-user
  external:
    fetch:
      backend:
        - https://api.devresolve.ai
