modules:
  trigger:
    - key: devresolve-issue-created-trigger
      endpoint: devresolve-endpoint
      events:
        - avi:jira:created:issue

    - key: devresolve-issue-updated-trigger
      endpoint: devresolve-endpoint
      events:
        - avi:jira:updated:issue

  endpoint:
    - key: devresolve-endpoint
      remote: devresolve-api
      route:
        path: /webhooks/jira/forge
      auth:
        appSystemToken:
          enabled: true

remotes:
  - key: devresolve-api
    baseUrl: https://api.devresolve.ai

app:
  id: ari:cloud:ecosystem::app/a59d630a-06ca-48ec-85e0-0f26bb09e4d1
  runtime:
    name: nodejs20.x

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - read:jira-user
    - read:app-system-token
  external:
    fetch:
      backend:
        - https://api.devresolve.ai
